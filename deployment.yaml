apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-technologies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abc-technologies
  template:
    metadata:
      labels:
        app: abc-technologies
    spec:
      containers:
      - name: abc-technologies
        image: abc-technologies
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: abc-technologies-service
spec:
  type: NodePort
  selector:
    app: abc-technologies
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080